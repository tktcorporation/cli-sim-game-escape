name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # proptest デフォルト 256 cases/test はローカル regression detection 用。
  # CI は merge ブロッキングなので fail fast 重視で 64 に絞る。
  # ローカルの cargo test では 256 のまま走るのでカバレッジは温存される。
  PROPTEST_CASES: "64"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # nextest はテストごとの所要時間を可視化し、JUnit 出力で flake 追跡もできる。
      # 速度面では `cargo test` と大差ないが、最遅テストを把握できる利点が大きい。
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --profile ci
      # JUnit を artifact にしておくと PR 上で test reporting アクションが拾える。
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo install trunk
      - run: trunk build
