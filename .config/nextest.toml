[profile.default]
# 30 秒で warning、60 秒で SIGTERM。テストが想定外に重くなった時に CI ログだけで気付ける。
slow-timeout = { period = "30s", terminate-after = 2 }
# 失敗したテストの出力だけ最後にまとめて表示する。
failure-output = "immediate-final"
success-output = "never"

[profile.ci]
# CI ではフレークの一時的な失敗を retry でカバー。本質的な失敗は3回連続で落ちる。
retries = 2
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

# 仕様上 30 秒以上かかる simulator テストは slow-timeout を緩める。
# それ以外のテストは 60 秒 (default profile の 30s × 2) で SIGTERM される invariant を維持する。
# Tier 4/5 の 30 分 sim は新評価関数 (BFS 多重) で CI 環境では 60s を超える。
[[profile.default.overrides]]
filter = 'test(/automation_drives_outposts_and_demolitions/) | test(/tier1_never_stalls_across_seeds/) | test(/tier_ordering_holds_at_30min/) | test(/tier4_strategies_specialize/) | test(/eco_strategy_does_not_stall/)'
slow-timeout = { period = "60s", terminate-after = 2 }

# 重い simulator は retry しない。ここで flake るのは現に slow なだけで、
# retry すると最大 6 分 ×3 = 18 分 CI を浪費する。
[[profile.ci.overrides]]
filter = 'test(/automation_drives_outposts_and_demolitions/) | test(/tier1_never_stalls_across_seeds/) | test(/tier_ordering_holds_at_30min/) | test(/tier4_strategies_specialize/) | test(/eco_strategy_does_not_stall/)'
retries = 0
