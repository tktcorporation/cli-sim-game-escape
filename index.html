<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link data-trunk rel="rust" />
    <title>Idle Games - 放置ゲーム</title>
    <style>
      /* line-height の SSOT。CSS と JS の両方がここから値を派生させる:
         - CSS: pre { line-height: var(--line-height) }
         - JS:  parseFloat(getComputedStyle(:root).getPropertyValue(...))
         viewport を最大限使うため CSS 既定 (1.2) より詰めてあるが、
         Fira Code monospace で行間にブリージングを残す範囲。 */
      :root {
        --line-height: 1.10;
      }
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        background-color: #0a0a0a;
        overflow: hidden;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      body > div {
        margin: 0;
        width: 100%;
      }
      pre {
        font-family: "Fira Code", "Courier New", monospace;
        font-size: 14px;
        /* Ratzilla sets inline height:15px which clips text when font is
           scaled up.  Let the row height follow the actual font size. */
        height: auto !important;
        line-height: var(--line-height);
        margin: 0;
        padding: 0;
        touch-action: manipulation;
        cursor: default;
      }
    </style>
  </head>
  <body></body>
  <script>
    // Reduce the viewport dimensions reported to Ratzilla so it calculates
    // fewer terminal columns/rows, resulting in larger text that fills the
    // real viewport via the fitGridToViewport scaler below.
    // SCALE_W < 1 → bigger text.  0.85 ≈ 18 % larger characters.
    (function() {
      var SCALE_W = 0.85;
      // CSS の `:root { --line-height: ... }` を SSOT として読む。
      // CSS 側の値を変えるだけでこの計算式も自動追従する (rowHeight 計算が
      // 実描画 line-height と同期、Math.floor の切り捨てで行が無駄になったり
      // 最後の行が viewport からクリップされる事故を防ぐ)。
      // var() が未対応の環境のため 1.10 をフォールバック。
      var cssLh = parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--line-height')
      );
      var LINE_HEIGHT = isNaN(cssLh) ? 1.10 : cssLh;

      // Capture originals before any overrides.
      var origW = window.innerWidth || screen.width || 375;
      var origH = window.innerHeight || screen.height || 667;

      // Estimate how many rows will fit after font-width scaling.
      // Ratzilla: cols ≈ floor(scaledWidth / 10), assumes 15px/row.
      // fitGridToViewport scales font by: realWidth / gridContentWidth.
      // gridContentWidth ≈ cols × charWidth (monospace char ≈ 8.4px at 14px).
      // After scaling, row height = baseFontSize × fontScale × lineHeight.
      var cols = Math.floor(origW * SCALE_W / 10);
      var charWidth = 8.4;
      var fontScale = origW / (cols * charWidth);
      var rowHeight = 14 * fontScale * LINE_HEIGHT;
      var maxRows = Math.floor(origH / rowHeight);
      // Ratzilla creates rows = floor(innerHeight / 15).
      // SCALE_H gives us exactly maxRows.
      var SCALE_H = Math.min((maxRows * 15) / origH, SCALE_W);

      function overrideWith(obj, proto, prop, scale) {
        var desc = Object.getOwnPropertyDescriptor(proto, prop);
        if (desc && desc.get) {
          var orig = desc.get;
          Object.defineProperty(obj, prop, {
            get: function() { return Math.floor(orig.call(obj) * scale); },
            configurable: true
          });
        }
      }

      // Width: fixed scale for bigger font.
      // Height: computed scale so rows × scaled-row-height ≈ viewport height.
      overrideWith(window, Window.prototype, 'innerWidth', SCALE_W);
      overrideWith(window, Window.prototype, 'innerHeight', SCALE_H);
      overrideWith(screen, Screen.prototype, 'width', SCALE_W);
      overrideWith(screen, Screen.prototype, 'height', SCALE_H);
    })();
  </script>
  <script>
    // Ratzilla calculates terminal columns as screen_width/10 (mobile) or
    // window.innerWidth/10 (desktop), assuming ~10px per character. When the
    // actual rendered character width differs from 10px the grid becomes
    // narrower than the viewport. This observer waits for Ratzilla to mount
    // its grid, measures the real content width, and scales the font so the
    // grid fills the viewport exactly.
    (function() {
      var applied = false;
      var lastViewportWidth = 0;

      function fitGridToViewport() {
        var grid = document.getElementById('grid') || document.querySelector('body > div');
        if (!grid) return false;
        var pre = grid.querySelector('pre');
        if (!pre) return false;

        var viewportWidth = document.documentElement.clientWidth;

        // <pre> is a block element so scrollWidth always equals the
        // container width, not the actual text width.  Temporarily switch
        // to inline-block so the element shrink-wraps to its content,
        // then measure with getBoundingClientRect for sub-pixel accuracy.
        pre.style.display = 'inline-block';
        var contentWidth = pre.getBoundingClientRect().width;
        pre.style.display = '';

        if (contentWidth <= 0 || contentWidth >= viewportWidth) return true;

        var currentFontSize = parseFloat(getComputedStyle(pre).fontSize);
        var scaledFontSize = Math.floor(currentFontSize * (viewportWidth / contentWidth) * 100) / 100;
        var preElements = document.querySelectorAll('pre');
        for (var i = 0; i < preElements.length; i++) {
          preElements[i].style.fontSize = scaledFontSize + 'px';
        }

        applied = true;
        lastViewportWidth = viewportWidth;
        return true;
      }

      // Observe DOM for Ratzilla grid mount, then fit once.
      var observer = new MutationObserver(function() {
        if (fitGridToViewport()) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Re-fit on orientation change or resize (debounced).
      var resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          var vw = document.documentElement.clientWidth;
          if (vw !== lastViewportWidth) {
            // Reset to CSS default so measurement is from a clean state.
            var preElements = document.querySelectorAll('pre');
            for (var i = 0; i < preElements.length; i++) {
              preElements[i].style.fontSize = '';
            }
            applied = false;
            // Allow one frame for layout, then re-measure.
            requestAnimationFrame(function() { fitGridToViewport(); });
          }
        }, 150);
      });
    })();

    // Touch / wheel handler: スワイプ・ホイールを keydown に変換する state
    // machine。タップは mousedown 経由で ratzilla に流す。
    //
    // metropolis は「マップ (上 or 左) と操作パネル (下 or 右)」が同じ <pre>
    // 内に同居するため、スワイプの開始位置がパネル領域なら panel scroll
    // (大文字 J/K)、それ以外 (= マップ領域) なら viewport scroll (j/k) と
    // 動的に振り分ける。Rust 側が `window.metropolisPanelRect` (cell 座標)
    // を毎フレーム書き出し、JS 側はそれと比較する。他ゲーム (cafe / abyss)
    // は rect を書き出さないので常に j/k フォールバック。
    //
    // 重要:
    // - mousedown 発火を touchstart→touchend に遅延させたのは、swipe 中に誤って
    //   強化購入が走るのを防ぐため。
    // - touchmove は { passive: false } + preventDefault() で iOS の bounce
    //   スクロールを抑制する (これがないと縦スワイプでページが弾む)。
    // - WASM 側 (web-sys) で TouchEvent を扱うと iOS Safari が黒画面化する
    //   バグ (commit 0caf982) を回避するため、touch 処理は全て JS 側で完結。
    (function() {
      var SWIPE_THRESHOLD = 10;  // px、tap と区別する最小移動量
      var ROW_HEIGHT_PX = 18;    // 1 'j'/'k' KeyEvent あたりに必要な縦移動量

      var startX = null, startY = null;
      var lastY = null;
      var isSwipe = false;
      var swipeAccum = 0;
      var swipeTargetIsPanel = false;  // touchstart 時に確定、touchmove で参照

      // タッチ位置 (clientX, clientY) が metropolis のパネル領域内かを判定。
      // Rust render が `window.metropolisPanelRect` (cell 座標) を export して
      // いない (= 他ゲーム選択中) や `<pre>` が無い時は false。
      function isPointInMetropolisPanel(clientX, clientY) {
        var rect = window.metropolisPanelRect;
        if (!rect) return false;
        var pre = document.querySelector('pre');
        if (!pre) return false;
        var pr = pre.getBoundingClientRect();
        if (pr.width <= 0 || pr.height <= 0) return false;
        var text = pre.textContent || '';
        var lines = text.split('\n');
        var cols = lines[0] ? lines[0].length : 0;
        var rows = lines.length;
        if (cols <= 0 || rows <= 0) return false;
        var cellW = pr.width / cols;
        var cellH = pr.height / rows;
        var col = Math.floor((clientX - pr.left) / cellW);
        var row = Math.floor((clientY - pr.top) / cellH);
        return col >= rect.x && col < rect.x + rect.w
            && row >= rect.y && row < rect.y + rect.h;
      }

      document.addEventListener('touchstart', function(e) {
        if (e.touches.length !== 1) {
          startX = startY = lastY = null;
          isSwipe = false;
          swipeAccum = 0;
          swipeTargetIsPanel = false;
          return;
        }
        var t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        lastY = t.clientY;
        isSwipe = false;
        swipeAccum = 0;
        swipeTargetIsPanel = isPointInMetropolisPanel(t.clientX, t.clientY);
        // ここでは preventDefault しても OK だが、swipe 後の touchend に
        // mousedown を遅延させるため、ここではまだ何もしない。
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (startY === null || e.touches.length !== 1) return;
        var t = e.touches[0];
        var dx = Math.abs(t.clientX - startX);
        var dy = t.clientY - startY;

        // 一旦 swipe 判定が立てば外れない (誤判定で tap に戻ると mousedown が
        // 後追い発火して購入誤動作するため)。
        if (!isSwipe && Math.abs(dy) > SWIPE_THRESHOLD && Math.abs(dy) > dx) {
          isSwipe = true;
        }
        if (isSwipe) {
          // bounce 抑制
          e.preventDefault();
          // 増分 (lastY → 現在 Y) を累積し、ROW_HEIGHT_PX ごとに key dispatch。
          // 上スワイプ (指上に動かす = clientY 減少) → 下にスクロールしたい。
          // panel 開始のスワイプは大文字 J/K (panel scroll)、それ以外は j/k。
          var delta = lastY - t.clientY;
          swipeAccum += delta;
          while (Math.abs(swipeAccum) >= ROW_HEIGHT_PX) {
            var down = swipeAccum > 0;
            var key;
            if (swipeTargetIsPanel) {
              key = down ? 'J' : 'K';
            } else {
              key = down ? 'j' : 'k';
            }
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
            swipeAccum -= (down ? ROW_HEIGHT_PX : -ROW_HEIGHT_PX);
          }
          lastY = t.clientY;
        }
      }, { passive: false });

      document.addEventListener('touchend', function(e) {
        if (startX === null) return;
        // tap として確定 (swipe してない) → 既存通り synthetic mousedown を発火。
        // swipe だった場合は何もしない (key dispatch は touchmove 内で完了)。
        if (!isSwipe) {
          document.dispatchEvent(new MouseEvent('mousedown', {
            clientX: startX,
            clientY: startY,
            button: 0,
            bubbles: true
          }));
        }
        startX = startY = lastY = null;
        isSwipe = false;
        swipeAccum = 0;
        swipeTargetIsPanel = false;
      }, { passive: false });

      // マウスホイール: デスクトップでも自然にスクロールできるように。
      // ホイール位置が metropolis パネル内なら J/K (panel scroll)、
      // それ以外なら j/k (viewport scroll) を dispatch。
      document.addEventListener('wheel', function(e) {
        if (e.deltaY === 0) return;
        var inPanel = isPointInMetropolisPanel(e.clientX, e.clientY);
        var down = e.deltaY > 0;
        var key;
        if (inPanel) {
          key = down ? 'J' : 'K';
        } else {
          key = down ? 'j' : 'k';
        }
        document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        // ページ全体のスクロールを抑制 (grid は viewport 同サイズなので不要)。
        e.preventDefault();
      }, { passive: false });
    })();
  </script>
</html>
