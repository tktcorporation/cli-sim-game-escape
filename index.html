<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Fira Code を webfont として明示的に読み込む。これがないと未インストール
         環境でフォールバック (Courier New / SF Mono / Droid Sans Mono) になり、
         char 幅が環境差で揺れて grid のフィットが端末ごとに異なる。
         ratzilla 公式 example と同じ CDN 設定で metrics を全環境で固定。 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/firacode/6.2.0/fira_code.min.css" />
    <!-- メインアプリ (cli-sim-game-escape バイナリ)。`data-type="main"` 明示。 -->
    <link data-trunk rel="rust" data-bin="cli-sim-game-escape" data-type="main" />
    <!-- Metropolis AI Web Worker (別 WASM インスタンス)。`data-type="worker"` で -->
    <!-- Trunk が worker 向けの ESM bundle を emit する (DOM 初期化を含まない)。 -->
    <!-- AI 探索のコストをメインスレッドの render から逃がすのが目的。 -->
    <link data-trunk rel="rust" data-bin="metropolis_worker" data-type="worker" />
    <!-- Trunk emit の `metropolis_worker.js` を取り込み、onmessage ハンドラから -->
    <!-- `ai_decide` を呼ぶ薄いラッパー。dist 直下に丸コピーされる。 -->
    <link data-trunk rel="copy-file" href="metropolis_worker_entry.js" />
    <title>Idle Games - 放置ゲーム</title>
    <style>
      /* line-height の SSOT。CSS と JS の両方がここから値を派生させる:
         - CSS: pre { line-height: var(--line-height) }
         - JS:  parseFloat(getComputedStyle(:root).getPropertyValue(...))
         viewport を最大限使うため CSS 既定 (1.2) より詰めてあるが、
         Fira Code monospace で行間にブリージングを残す範囲。 */
      :root {
        --line-height: 1.10;
      }
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        background-color: #0a0a0a;
        overflow: hidden;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
      }
      body > div {
        margin: 0;
        width: 100%;
      }
      pre {
        font-family: "Fira Code", "Courier New", monospace;
        font-size: 14px;
        /* Ratzilla sets inline height:15px which clips text when font is
           scaled up.  Let the row height follow the actual font size. */
        height: auto !important;
        line-height: var(--line-height);
        margin: 0;
        padding: 0;
        touch-action: manipulation;
        cursor: default;
      }
    </style>
  </head>
  <body></body>
  <script>
    // viewport を grid にぴったり合わせるロジック (mount-and-correct):
    //
    //   1. ratzilla が起動する前に、視覚 viewport から推定した cols/rows で
    //      window.innerWidth/innerHeight (と screen.*) を override しておく
    //   2. ratzilla が grid を mount したら、まず font を実 viewport 幅に
    //      合わせて scale (横方向は実測ベース)
    //   3. 続いて 1 行の実 height を測って、実 viewport 高さに収まる行数を
    //      算出。推定値とズレていたら override の scale を書き換えて
    //      `resize` を dispatch、ratzilla に grid を作り直させる
    //
    // 推定が当たれば step 3 は no-op。当たらなくても measurement で必ず
    // 1〜2 イテレーションで収束する。
    (function() {
      // CSS の `:root { --line-height: ... }` を SSOT として読む。
      // var() 未対応環境のため 1.10 をフォールバック。
      var cssLh = parseFloat(
        getComputedStyle(document.documentElement).getPropertyValue('--line-height')
      );
      var LINE_HEIGHT = isNaN(cssLh) ? 1.10 : cssLh;

      // 視覚 viewport = ユーザーが実際に見える領域。fontScale / 行数推定の基準。
      // fitGridToViewport も documentElement.clientWidth (≈ window.innerWidth)
      // 基準にスケールするので、ここを揃えないと横と縦で別世界の数字を扱う。
      var visibleW = window.innerWidth || screen.width || 375;
      var visibleH = window.innerHeight || screen.height || 667;

      // hidden span で実 char 幅を測る。Fira Code は webfont 配信していない
      // ため未インストール環境では Courier New / SF Mono にフォールバック
      // し char 幅が変わる。100 文字一括測定で subpixel 丸めを 1/100 に薄める。
      // fallback 8.4 は Fira Code 14px の理論値。
      var FONT_FAMILY = '"Fira Code", "Courier New", monospace';
      var FONT_SIZE_PX = 14;
      function measureCharWidth() {
        var SAMPLES = 100;
        var span = document.createElement('span');
        span.style.cssText =
          'position:absolute;visibility:hidden;white-space:pre;'
          + 'font-family:' + FONT_FAMILY + ';font-size:' + FONT_SIZE_PX + 'px;';
        span.textContent = new Array(SAMPLES + 1).join('M');
        document.body.appendChild(span);
        var width = span.getBoundingClientRect().width;
        document.body.removeChild(span);
        var per = width / SAMPLES;
        return per > 0 ? per : 8.4;
      }

      // 横方向: 視覚幅から逆算して target cols を決める。
      // SCALE_W = 0.85 で文字を 18% 程度大きくする (画面密度に応じた可読性)。
      var SCALE_W = 0.85;
      var charWidth = measureCharWidth();
      var targetCols = Math.floor(visibleW * SCALE_W / 10);
      var predictedFontScale = visibleW / (targetCols * charWidth);
      var predictedRowH = FONT_SIZE_PX * predictedFontScale * LINE_HEIGHT;
      var targetRows = Math.floor(visibleH / predictedRowH);

      // ratzilla 0.3.0 は実行環境で参照プロパティ・行除数を切り替える
      // (utils.rs:46-56):
      //   desktop: window.inner{Width,Height} / {10, 20}
      //   mobile : screen.{width,height}      / {10, 19}
      // 各 override は floor(real * scale) を返す。どちらのパスを通っても
      // 同じ targetCols/targetRows になるよう、プロパティごとに専用 scale
      // を持つ。+0.5px は IEEE754 往復誤差 (~1e-12) ≪ 0.5 ≪ 行除数 の
      // 安全域、行が +1 増える方向には絶対に転ばない。
      // 値は mutable: measurement で targetRows が更新されたら再計算。
      // 原始 getter を prototype chain 遡って取得。後で override しても
      // 物理 screen size を読み戻せる (resize ハンドラで分母として使う)。
      // 回転で物理 width/height が swap する端末もあるので毎回原始値で読む。
      function findGetter(obj, prop) {
        var current = obj;
        while (current) {
          var desc = Object.getOwnPropertyDescriptor(current, prop);
          if (desc && desc.get) return desc.get;
          current = Object.getPrototypeOf(current);
        }
        return null;
      }
      var origScreenWGet = findGetter(screen, 'width');
      var origScreenHGet = findGetter(screen, 'height');
      function realScreenW() {
        return (origScreenWGet ? origScreenWGet.call(screen) : visibleW) || visibleW;
      }
      function realScreenH() {
        return (origScreenHGet ? origScreenHGet.call(screen) : visibleH) || visibleH;
      }

      var scales = {
        wW: 0, wH: 0, sW: 0, sH: 0
      };
      function recomputeScales() {
        scales.wW = (targetCols * 10 + 0.5) / visibleW;
        scales.sW = (targetCols * 10 + 0.5) / realScreenW();
        scales.wH = (targetRows * 20 + 0.5) / visibleH;
        scales.sH = (targetRows * 19 + 0.5) / realScreenH();
      }
      recomputeScales();

      // Chrome 最新版では innerWidth / innerHeight の getter が Window.prototype
      // ではなく prototype chain の別ノード (WindowProperties / Window 本体) に
      // 定義されることがある。固定で Window.prototype だけ見ると getter が
      // 見つからず override が silent skip されて ratzilla が raw 値を使ってしまう
      // (cols/rows がスケールされず gridH ≠ viewportH になる)。
      // findGetter は前段で定義済み: prototype chain を遡って getter を探す。
      function overrideWith(obj, prop, key) {
        var orig = findGetter(obj, prop);
        if (!orig) {
          console.warn('[viewport-fit] override skipped: ' + prop + ' getter not found');
          return false;
        }
        Object.defineProperty(obj, prop, {
          get: function() { return Math.floor(orig.call(obj) * scales[key]); },
          configurable: true
        });
        return true;
      }
      overrideWith(window, 'innerWidth', 'wW');
      overrideWith(window, 'innerHeight', 'wH');
      overrideWith(screen, 'width', 'sW');
      overrideWith(screen, 'height', 'sH');

      // ── ここから mount 後の adjustment ─────────────────────────
      // ratzilla が grid を作ったら、font を視覚幅に合わせ → 実 row height
      // を測って targetRows を補正する。

      function findGrid() {
        return document.getElementById('grid')
          || document.querySelector('body > div');
      }

      // 横を実測してフォントサイズを決定。pre は block 要素なので
      // shrink-wrap させるため一時的に inline-block にして測る。
      // overflow (real font が予測より幅広) 時は scale down で対応するため、
      // 上限は付けない (font ratio < 1 で content が viewport に収まる)。
      function fitFontWidth(grid) {
        var pre = grid.querySelector('pre');
        if (!pre) return false;
        var viewportWidth = document.documentElement.clientWidth;
        pre.style.display = 'inline-block';
        var contentWidth = pre.getBoundingClientRect().width;
        pre.style.display = '';
        if (contentWidth <= 0) return false;
        var currentFontSize = parseFloat(getComputedStyle(pre).fontSize);
        var scaledFontSize = Math.floor(
          currentFontSize * (viewportWidth / contentWidth) * 100
        ) / 100;
        var preElements = document.querySelectorAll('pre');
        for (var i = 0; i < preElements.length; i++) {
          preElements[i].style.fontSize = scaledFontSize + 'px';
        }
        return true;
      }

      // 縦を実測。font scale 適用後の実 row height で「視覚 viewport に
      // 何行入るか」を計算し、現在の grid 行数とズレていたら scale を
      // 更新して resize を dispatch、ratzilla に grid を作り直させる。
      // ratzilla の onresize ハンドラは initialized=false にするだけで、
      // 実際の populate は次の draw タイミング (game loop) で走る。
      // 戻り値: true = 行数調整した (続けて再 measurement が要る),
      //         false = 調整不要 (収束)。
      var selfDispatching = false;
      // measurement→dispatch ループの上限。actualRowH が webfont swap や
      // sub-pixel 揺らぎで微小に変動すると ideal が振動して無限ループ化
      // しうる。3 回で収束しなければ「最後の値で妥協」して画面を死守。
      var MAX_FIT_ITERS = 3;
      var fitIters = 0;
      function fitRowCount(grid) {
        var pres = grid.querySelectorAll('pre');
        if (pres.length === 0) return false;
        var actualRowH = pres[0].getBoundingClientRect().height;
        if (actualRowH <= 0) return false;
        var realH = document.documentElement.clientHeight;
        var ideal = Math.floor(realH / actualRowH);
        if (ideal === targetRows) return false;
        if (fitIters >= MAX_FIT_ITERS) {
          console.warn('[viewport-fit] iter cap hit, holding rows=' + targetRows
            + ' ideal=' + ideal + ' rowH=' + actualRowH.toFixed(2));
          return false;
        }
        fitIters++;
        targetRows = ideal;
        recomputeScales();
        selfDispatching = true;
        window.dispatchEvent(new Event('resize'));
        selfDispatching = false;
        return true;
      }

      var settled = false;

      function tryFit() {
        var grid = findGrid();
        if (!grid) return false;
        if (!fitFontWidth(grid)) return false;
        var changed = fitRowCount(grid);
        if (!changed) {
          settled = true;
          // 実環境で何が起きているか正確に切り分けるための診断。
          // 期待: gridH ≈ bodyH ≈ docH ≈ visibleH。ズレてる場所で原因が分かる。
          var pres = grid.querySelectorAll('pre');
          var rowH = pres.length ? pres[0].getBoundingClientRect().height : 0;
          var gridRect = grid.getBoundingClientRect();
          var bodyRect = document.body.getBoundingClientRect();
          console.info('[viewport-fit]',
            'visible=' + visibleW + 'x' + visibleH,
            'docH=' + document.documentElement.clientHeight,
            'bodyH=' + bodyRect.height.toFixed(0),
            'gridH=' + gridRect.height.toFixed(0),
            'rows=' + pres.length, 'rowH=' + rowH.toFixed(2),
            'cols=' + targetCols,
            'charW=' + charWidth.toFixed(2),
            'gap_to_visible=' + (visibleH - gridRect.height).toFixed(0) + 'px');
        }
        return true;
      }

      // mount を待って observe。settle するまで disconnect しない
      // (ratzilla が複数回 populate するため)。settle 後は fonts.ready 等
      // で再走させない: webfont swap タイミングと measureCharWidth /
      // pre の computed font が乖離した状態で fitRowCount を回すと、
      // ideal が振動して dispatch ループが暴走 (画面が再構築され続けて
      // blank に見える) する事故があったため。
      var observer = new MutationObserver(function() {
        tryFit();
        if (settled) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // 真の viewport resize (回転や URL バー collapse) のみで再走。
      // 自己 dispatch (= fitRowCount の調整トリガ) は selfDispatching フラグで弾く。
      var resizeTimer;
      window.addEventListener('resize', function() {
        if (selfDispatching) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          // 視覚 viewport を更新 → font とサイズを再測定して再 settle へ。
          // realScreen* は原始 getter 経由で都度読むので別途更新不要。
          visibleW = document.documentElement.clientWidth;
          visibleH = document.documentElement.clientHeight;
          // 元のフォントサイズに戻してから再測定 (前回の inline scale を消す)。
          var preElements = document.querySelectorAll('pre');
          for (var i = 0; i < preElements.length; i++) {
            preElements[i].style.fontSize = '';
          }
          // 推定を更新。webfont が後から swap すると char 幅が変わるので
          // resize ごとに再 measure (回転やデバイス変更でも到着済み font を
          // 反映できる)。fonts.ready 単発で再 fit する path は無限 dispatch
          // ループで画面が消える事故があったため使わない。
          charWidth = measureCharWidth();
          targetCols = Math.floor(visibleW * SCALE_W / 10);
          predictedFontScale = visibleW / (targetCols * charWidth);
          predictedRowH = FONT_SIZE_PX * predictedFontScale * LINE_HEIGHT;
          targetRows = Math.floor(visibleH / predictedRowH);
          recomputeScales();
          settled = false;
          fitIters = 0;
          observer.observe(document.body, { childList: true, subtree: true });
          requestAnimationFrame(tryFit);
        }, 150);
      });
    })();
  </script>
  <script>

    // 効果音プレイヤー (Web Audio API による合成音)。
    //
    // Rust 側は `window.__playSound("click")` のように name だけ渡す。
    // 音源ファイルは持たず、その場で oscillator + envelope を組んで再生する。
    //
    // 設計メモ:
    // - AudioContext は最初の `__playSound` 呼び出しまで遅延生成する (page load
    //   時点で作ると Chrome の autoplay policy で suspended のまま残る)。
    // - それでも user gesture を踏む前に呼ばれる可能性に備え、
    //   mousedown / keydown / touchstart の最初の発火で resume() する。
    // - 未知の name は no-op (落とさず無視)。
    // - エラーは握りつぶす (音が出ないだけでゲーム本体は止めない)。
    (function() {
      var ctx = null;
      var resumed = false;

      function getCtx() {
        if (!ctx) {
          var AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return null;
          try { ctx = new AC(); } catch (_e) { return null; }
        }
        if (!resumed && ctx.state === 'suspended' && ctx.resume) {
          ctx.resume().catch(function(){});
          resumed = true;
        }
        return ctx;
      }

      // 単音 (oscillator + gain envelope) を鳴らす共通ヘルパー。
      // duration は秒。startAt は ctx.currentTime からのオフセット (秒) で
      // アルペジオの並べ替えに使う。
      function tone(c, type, freq, duration, gain, startAt) {
        var t0 = c.currentTime + (startAt || 0);
        var osc = c.createOscillator();
        var g = c.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        // 短い attack → 線形 decay。クリック音を残さないため exp 終端ではなく
        // linearRampToValueAtTime(0, end) で確実に 0 まで落とす。
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(gain, t0 + 0.005);
        g.gain.linearRampToValueAtTime(0, t0 + duration);
        osc.connect(g).connect(c.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
      }

      // 周波数スイープ (購入音・ガチャ用)。f0 → f1 を duration 秒で。
      function sweep(c, type, f0, f1, duration, gain) {
        var t0 = c.currentTime;
        var osc = c.createOscillator();
        var g = c.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(f0, t0);
        osc.frequency.linearRampToValueAtTime(f1, t0 + duration);
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(gain, t0 + 0.005);
        g.gain.linearRampToValueAtTime(0, t0 + duration);
        osc.connect(g).connect(c.destination);
        osc.start(t0);
        osc.stop(t0 + duration + 0.02);
      }

      // ホワイトノイズ短バースト (敵被弾用)。filter で帯域を狭める。
      function noiseBurst(c, duration, gain, cutoff) {
        var t0 = c.currentTime;
        var bufSize = Math.floor(c.sampleRate * duration);
        var buf = c.createBuffer(1, bufSize, c.sampleRate);
        var data = buf.getChannelData(0);
        for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        var src = c.createBufferSource();
        src.buffer = buf;
        var filt = c.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = cutoff;
        var g = c.createGain();
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(gain, t0 + 0.003);
        g.gain.linearRampToValueAtTime(0, t0 + duration);
        src.connect(filt).connect(g).connect(c.destination);
        src.start(t0);
        src.stop(t0 + duration + 0.02);
      }

      // 音色テーブル。Rust 側からは name でしか指定しないので、ここが
      // 唯一の音色定義点。汎用 + metropolis + abyss でカテゴリ分け。
      var SOUNDS = {
        // ── 汎用 ──
        // 短く軽いクリック音。連打されても耳障りにならないよう gain は控えめ。
        click:    function(c) { tone(c, 'square',   880, 0.04, 0.05); },
        // メニュー選択 / ゲーム入場。click より少し低く存在感を出す。
        select:   function(c) { tone(c, 'triangle', 660, 0.08, 0.08); },
        // 操作失敗 / 残高不足。
        error:    function(c) { tone(c, 'square',   180, 0.15, 0.07); },

        // ── 購入系 (汎用 + metropolis + abyss で共有) ──
        purchase: function(c) { sweep(c, 'triangle', 520, 880, 0.10, 0.10); },
        // 装備強化 (abyss)。ベル風の高音 1 発。
        enhance:  function(c) {
          tone(c, 'triangle', 1320, 0.08, 0.10);
          tone(c, 'sine',     1980, 0.10, 0.06, 0.01);
        },
        // ガチャ (abyss)。長めの上昇スイープ + 終端に高音 1 発。
        gacha:    function(c) {
          sweep(c, 'sawtooth', 220, 880, 0.25, 0.06);
          tone(c, 'triangle', 1320, 0.10, 0.08, 0.25);
        },
        // レベルアップ / AI 進化。3 音アルペジオ (C - E - G)。
        level_up: function(c) {
          tone(c, 'triangle', 523, 0.08, 0.10, 0.00);
          tone(c, 'triangle', 659, 0.08, 0.10, 0.08);
          tone(c, 'triangle', 784, 0.14, 0.10, 0.16);
        },

        // ── abyss ──
        // 自分が被弾。低音 + 短ノイズ。
        hit_hero:  function(c) {
          tone(c, 'square', 140, 0.10, 0.10);
          noiseBurst(c, 0.06, 0.05, 400);
        },
        // ボス出現。低音アルペジオ (下降)。
        boss_appear: function(c) {
          tone(c, 'sawtooth', 220, 0.12, 0.10, 0.00);
          tone(c, 'sawtooth', 165, 0.12, 0.10, 0.10);
          tone(c, 'sawtooth', 110, 0.30, 0.10, 0.20);
        },
        // フロア突破。4 音上昇アルペジオ。
        floor_clear: function(c) {
          tone(c, 'triangle', 523, 0.07, 0.10, 0.00);
          tone(c, 'triangle', 659, 0.07, 0.10, 0.07);
          tone(c, 'triangle', 784, 0.07, 0.10, 0.14);
          tone(c, 'triangle', 1046, 0.18, 0.12, 0.21);
        },
        // クリティカル。鋭い高音 1 発。
        critical: function(c) { tone(c, 'sawtooth', 1760, 0.08, 0.10); },
      };

      // ハプティクス (Vibration API)。効果音と同じ「操作イベント名」で振動
      // パターンを引く。音と振動はどちらも同じ操作イベントへのフィードバック
      // なので、名前を共有して __playSound 1 箇所から両方を駆動する。Rust 側は
      // sound::play(name) を呼ぶだけで、対応端末では音と振動の両方が出る。
      //
      // navigator.vibrate は Android Chrome 等でのみ動作し、iOS Safari は非対応
      // (未対応環境では振動しないだけの no-op)。Chrome は user gesture 外からの
      // vibrate を無視するため、tick 由来 (自動戦闘の被弾など) の振動は鳴らない
      // ことがある — これは許容する graceful degradation。
      //
      // パターンは ms 単位の数値 1 つ、または [振動, 停止, 振動, ...] の配列。
      // SOUNDS テーブルと同じ name をキーにするので、両テーブルを揃えて保つ。
      var VIBRATION = {
        // ── 汎用 ──
        click:    8,
        select:   15,
        error:    [25, 40, 25],
        // ── 購入系 ──
        purchase: 18,
        enhance:  [10, 30, 10],
        level_up: [12, 30, 12, 30, 20],
        // ── abyss ──
        gacha:       [30, 20, 50],
        hit_hero:    40,
        boss_appear: [60, 40, 60, 40, 90],
        floor_clear: [12, 25, 12, 25, 12, 25, 30],
        critical:    [15, 20, 15],
      };

      function vibrate(name) {
        if (!navigator || typeof navigator.vibrate !== 'function') return;
        var pattern = VIBRATION[name];
        if (pattern === undefined) return;
        try { navigator.vibrate(pattern); } catch (_e) {}
      }

      window.__playSound = function(name) {
        // 振動は音と独立に発火する (AudioContext 非対応でも振動はさせたい)。
        vibrate(name);
        try {
          var fn = SOUNDS[name];
          if (!fn) return;
          var c = getCtx();
          if (!c) return;
          fn(c);
        } catch (_e) {
          // 何もしない (音が出ないだけ)。
        }
      };

      // user gesture を踏んだら AudioContext を resume する保険。
      // __playSound 内でも resume するが、最初の音再生より前に gesture を
      // 踏んでおきたい (resume は非同期なので最初の音が無音になることがある)。
      function primeOnGesture() {
        var c = getCtx();
        if (c && c.state === 'suspended' && c.resume) {
          c.resume().catch(function(){});
        }
      }
      document.addEventListener('mousedown',  primeOnGesture, { once: true, capture: true });
      document.addEventListener('keydown',    primeOnGesture, { once: true, capture: true });
      document.addEventListener('touchstart', primeOnGesture, { once: true, capture: true, passive: true });
    })();

  </script>
  <script>

    // Touch / wheel handler: スワイプ・ホイールを keydown に変換する state
    // machine。タップは mousedown 経由で ratzilla に流す。
    //
    // metropolis は「マップ (上 or 左) と操作パネル (下 or 右)」が同じ <pre>
    // 内に同居するため、スワイプの開始位置がパネル領域なら panel scroll
    // (大文字 J/K)、それ以外 (= マップ領域) なら viewport scroll (j/k) と
    // 動的に振り分ける。Rust 側が `window.metropolisPanelRect` (cell 座標)
    // を毎フレーム書き出し、JS 側はそれと比較する。他ゲーム (cafe / abyss)
    // は rect を書き出さないので常に j/k フォールバック。
    //
    // 重要:
    // - mousedown 発火を touchstart→touchend に遅延させたのは、swipe 中に誤って
    //   強化購入が走るのを防ぐため。
    // - touchmove は { passive: false } + preventDefault() で iOS の bounce
    //   スクロールを抑制する (これがないと縦スワイプでページが弾む)。
    // - WASM 側 (web-sys) で TouchEvent を扱うと iOS Safari が黒画面化する
    //   バグ (commit 0caf982) を回避するため、touch 処理は全て JS 側で完結。
    (function() {
      var SWIPE_THRESHOLD = 10;  // px、tap と区別する最小移動量
      var ROW_HEIGHT_PX = 18;    // 1 'j'/'k' KeyEvent あたりに必要な縦移動量

      var startX = null, startY = null;
      var lastY = null;
      var isSwipe = false;
      var swipeAccum = 0;
      var swipeTargetIsPanel = false;  // touchstart 時に確定、touchmove で参照

      // iOS Safari 向けタップ触覚。iOS は Vibration API (navigator.vibrate) を
      // 一切実装しないため、Safari 17.4+ の <input type="checkbox" switch> を
      // label 経由で click() するとシステム触覚 (Taptic Engine) が鳴る挙動で
      // 代替する。label 経由でしか発火しない (input を直接 click しても鳴らない)。
      //
      // - navigator.vibrate がある環境 (Android Chrome 等) では __playSound 側の
      //   Vibration API が触覚を担うので、こちらは何もしない (二重発火防止)。
      // - 触覚は「実ユーザー操作のコールスタック内」でしか発火しないため、合成
      //   mousedown 経由の WASM ハンドラ (= __playSound) ではなく、実 touchend で
      //   タップ確定した瞬間に鳴らす。tick 由来 (自動戦闘の被弾など) の触覚は
      //   iOS では出せない — 許容する graceful degradation。
      // - iOS は触覚の種類が 1 つだけで、Android のような強弱・パターンの作り
      //   分けはできない (タップごとに同じ「コツッ」)。
      // - 注意: iOS 26.5 でこの挙動が塞がれたため、それ以降の iPhone では鳴らない。
      var supportsVibrate = !!(navigator && typeof navigator.vibrate === 'function');
      var iosHapticLabel = null;
      function iosTapHaptic() {
        if (supportsVibrate) return;
        if (!iosHapticLabel) {
          try {
            var input = document.createElement('input');
            input.type = 'checkbox';
            input.setAttribute('switch', '');
            var label = document.createElement('label');
            label.setAttribute('aria-hidden', 'true');
            // 画面外かつ pointer-events:none で隠す。elementFromPoint による
            // <pre> ヒット検出 (dom_element_to_cell) を絶対に奪わないため。
            label.style.cssText =
              'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;'
              + 'opacity:0;pointer-events:none;';
            label.appendChild(input);
            document.body.appendChild(label);
            iosHapticLabel = label;
          } catch (_e) { return; }
        }
        try { iosHapticLabel.click(); } catch (_e) {}
      }

      // metropolis 以外のゲーム (cafe / abyss など) に切り替えた時に古い
      // rect が残ると、その範囲のスワイプが J/K に化けて他ゲームのスクロール
      // を奪う。Rust 側が毎フレーム `updatedAt` (performance.now()) を更新する
      // ので、N ms 以上更新が無ければ stale とみなして無視する。
      // metropolis は 10 ticks/sec (= 100ms 間隔) で render するため、500ms の
      // しきい値は「フレーム遅延の許容」と「ゲーム切替の即時無効化」のバランス。
      var PANEL_RECT_STALE_MS = 500;

      // タッチ位置 (clientX, clientY) が metropolis のパネル領域内かを判定。
      // rect が無い / stale / `<pre>` が無い場合は false。
      function isPointInMetropolisPanel(clientX, clientY) {
        var rect = window.metropolisPanelRect;
        if (!rect) return false;
        var now = (performance && performance.now) ? performance.now() : 0;
        if (typeof rect.updatedAt !== 'number'
            || now - rect.updatedAt > PANEL_RECT_STALE_MS) {
          return false;
        }
        var pre = document.querySelector('pre');
        if (!pre) return false;
        var pr = pre.getBoundingClientRect();
        if (pr.width <= 0 || pr.height <= 0) return false;
        var text = pre.textContent || '';
        var lines = text.split('\n');
        var cols = lines[0] ? lines[0].length : 0;
        var rows = lines.length;
        if (cols <= 0 || rows <= 0) return false;
        var cellW = pr.width / cols;
        var cellH = pr.height / rows;
        var col = Math.floor((clientX - pr.left) / cellW);
        var row = Math.floor((clientY - pr.top) / cellH);
        return col >= rect.x && col < rect.x + rect.w
            && row >= rect.y && row < rect.y + rect.h;
      }

      document.addEventListener('touchstart', function(e) {
        if (e.touches.length !== 1) {
          startX = startY = lastY = null;
          isSwipe = false;
          swipeAccum = 0;
          swipeTargetIsPanel = false;
          return;
        }
        var t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        lastY = t.clientY;
        isSwipe = false;
        swipeAccum = 0;
        swipeTargetIsPanel = isPointInMetropolisPanel(t.clientX, t.clientY);
        // ここでは preventDefault しても OK だが、swipe 後の touchend に
        // mousedown を遅延させるため、ここではまだ何もしない。
        e.preventDefault();
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (startY === null || e.touches.length !== 1) return;
        var t = e.touches[0];
        var dx = Math.abs(t.clientX - startX);
        var dy = t.clientY - startY;

        // 一旦 swipe 判定が立てば外れない (誤判定で tap に戻ると mousedown が
        // 後追い発火して購入誤動作するため)。
        if (!isSwipe && Math.abs(dy) > SWIPE_THRESHOLD && Math.abs(dy) > dx) {
          isSwipe = true;
        }
        if (isSwipe) {
          // bounce 抑制
          e.preventDefault();
          // 増分 (lastY → 現在 Y) を累積し、ROW_HEIGHT_PX ごとに key dispatch。
          // 上スワイプ (指上に動かす = clientY 減少) → 下にスクロールしたい。
          // panel 開始のスワイプは大文字 J/K (panel scroll)、それ以外は j/k。
          var delta = lastY - t.clientY;
          swipeAccum += delta;
          while (Math.abs(swipeAccum) >= ROW_HEIGHT_PX) {
            var down = swipeAccum > 0;
            var key;
            if (swipeTargetIsPanel) {
              key = down ? 'J' : 'K';
            } else {
              key = down ? 'j' : 'k';
            }
            document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
            swipeAccum -= (down ? ROW_HEIGHT_PX : -ROW_HEIGHT_PX);
          }
          lastY = t.clientY;
        }
      }, { passive: false });

      document.addEventListener('touchend', function(e) {
        if (startX === null) return;
        // tap として確定 (swipe してない) → 既存通り synthetic mousedown を発火。
        // swipe だった場合は何もしない (key dispatch は touchmove 内で完了)。
        if (!isSwipe) {
          // iOS の触覚は実ジェスチャ内でしか鳴らないため、合成 mousedown を
          // dispatch する前にこの実 touchend のコールスタックで発火させる。
          iosTapHaptic();
          document.dispatchEvent(new MouseEvent('mousedown', {
            clientX: startX,
            clientY: startY,
            button: 0,
            bubbles: true
          }));
        }
        startX = startY = lastY = null;
        isSwipe = false;
        swipeAccum = 0;
        swipeTargetIsPanel = false;
      }, { passive: false });

      // マウスホイール: デスクトップでも自然にスクロールできるように。
      // ホイール位置が metropolis パネル内なら J/K (panel scroll)、
      // それ以外なら j/k (viewport scroll) を dispatch。
      document.addEventListener('wheel', function(e) {
        if (e.deltaY === 0) return;
        var inPanel = isPointInMetropolisPanel(e.clientX, e.clientY);
        var down = e.deltaY > 0;
        var key;
        if (inPanel) {
          key = down ? 'J' : 'K';
        } else {
          key = down ? 'j' : 'k';
        }
        document.dispatchEvent(new KeyboardEvent('keydown', { key: key, bubbles: true }));
        // ページ全体のスクロールを抑制 (grid は viewport 同サイズなので不要)。
        e.preventDefault();
      }, { passive: false });
    })();
  </script>
